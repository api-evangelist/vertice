apis:
  - aid: vertice:saas-procurement-api
    name: Vertice SaaS Procurement API
    description: >-
      The Vertice SaaS Procurement API enables deep, bi-directional data flow
      for partners and enterprise integrations. The API supports procurement
      workflows including intake-to-procure, contract lifecycle management,
      vendor management, spend analytics, and workflow automation across 32,000+
      vendors.
    humanURL: https://www.vertice.one/partners
    tags:
      - Contract Management
      - Procurement
      - SaaS Management
      - Spend Analytics
      - Vendor Management
    properties:
      - type: Documentation
        url: https://help.vertice.one/hc/en-us/
      - type: Integrations
        url: https://www.vertice.one/platform/integrations
      - type: Partners
        url: https://www.vertice.one/partners
  - aid: vertice:cloud-cost-optimization-api
    name: Vertice Cloud Cost Optimization API
    description: >-
      Vertice Cloud Cost Optimization integrates with AWS, GCP, and Azure
      accounts to provide cloud visibility, cost analytics, and optimization
      recommendations. The integration uses cross-account IAM roles (AWS),
      service accounts (GCP), or app registrations (Azure) to access billing
      data, Cost and Usage Reports, and Cost Optimization Recommendations.
      Infrastructure-as-code templates are available for automated provisioning.
    humanURL: https://www.vertice.one/platform/cloud-cost-optimization
    tags:
      - AWS
      - Azure
      - Cloud Cost Optimization
      - Cloud Spend
      - GCP
    properties:
      - type: Documentation
        url: https://www.vertice.one/platform/cloud-cost-optimization
      - type: GitHubOrganization
        url: https://github.com/VerticeOne
      - type: TerraformModule
        url: https://github.com/VerticeOne/terraform-aws-vertice-integration
      - type: CloudFormationTemplate
        url: https://github.com/VerticeOne/cloudformation-aws-vertice-cco-integration
